<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - Venmail Apps</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f172a;
        color: #e2e8f0;
        font-family: 'Onest', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        text-align: center;
      }
      .container {
        max-width: 360px;
        padding: 24px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 1.5rem;
        font-weight: 600;
      }
      p {
        margin: 0 0 24px;
        font-size: 1rem;
        line-height: 1.5;
        color: #94a3b8;
      }
      button {
        padding: 10px 20px;
        border: 0;
        border-radius: 8px;
        background: #3b82f6;
        color: #fff;
        font-size: 0.95rem;
        font-weight: 500;
        cursor: pointer;
      }
      button:hover {
        background: #2563eb;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>You are offline</h1>
      <p>Please check your internet connection and try again. Cached pages are still available.</p>
      <button onclick="window.location.reload()">Retry</button>
    </div>
  </body>
</html>
